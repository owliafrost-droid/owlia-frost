<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Owlia Frost</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f8f8f8;
      color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 50px 30px;
      border-radius: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 700px;
      width: 100%;
      text-align: center;
    }

    .mini {
      letter-spacing: 4px;
      font-size: 12px;
      color: gray;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
    }

    p {
      color: #555;
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      padding: 16px 32px;
      border-radius: 18px;
      text-decoration: none;
      color: black;
      border: 1px solid #ddd;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .footer {
      margin-top: 35px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="mini">Owlia Frost</div>

    <h1>Estilo premium que impone presencia</h1>

    <p>
      Moda, accesorios y tecnología con una esencia elegante,
      urbana y exclusiva. Diseñado para quienes quieren destacar
      con presencia y estilo propio.
    </p>

    <a 
      class="btn"
      href="https://wa.me/5214491731943"
      target="_blank"
    >
      Contactar por WhatsApp
    </a>

    <div class="footer">
      Moda • Accesorios • Tecnología • Estilo premium
    </div>
  </div>

</body>
</html>
